# Application name
spring.application.name=mailService

# SMTP Mail settings (Gmail SMTP server)
spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.username=rayenbelkahla219@gmail.com
spring.mail.password=sjstnleamvglbwtl

spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
spring.mail.properties.mail.smtp.starttls.required=true
# Kafka bootstrap server (should match your Kafka broker address)
spring.kafka.bootstrap-servers=localhost:9092

# Kafka consumer config for mail service
spring.kafka.consumer.group-id=email-group
spring.kafka.consumer.auto-offset-reset=earliest
spring.kafka.consumer.key-deserializer=org.apache.kafka.common.serialization.StringDeserializer
spring.kafka.consumer.value-deserializer=org.springframework.kafka.support.serializer.JsonDeserializer
server.port=8082
# Trust packages for JSON deserialization (set exact package instead of *)
spring.kafka.consumer.properties.spring.json.trusted.packages=net.pm.mailservice.mailservice.dto

# Disable expecting type headers in messages (since your producer doesn't send them)
spring.kafka.consumer.properties.spring.json.use.type.headers=false

# Provide a default type to deserialize when no type header is present
spring.kafka.consumer.properties.spring.json.value.default.type=net.pm.mailservice.mailservice.dto.EmailRequest
